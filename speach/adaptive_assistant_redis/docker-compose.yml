version: '3.8'
services:
  redis:
    image: redis:latest
    container_name: adaptive_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
      # 1. Map your local conf file to the container's config folder
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    # 2. Tell Redis to start using your specific conf file
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped